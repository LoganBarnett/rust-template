# Workspace dependencies required by the server crate type.
# Used by crate-add.sh to ensure deps exist when adding to an existing project.
[dependencies]
rust-template-foundation = { git = "https://github.com/LoganBarnett/rust-template.git" }
rust-template-lib = { path = "crates/lib" }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "json", "fmt"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
toml = "0.8"
thiserror = "2.0"
tap = "1.0"
clap = { version = "4.5", features = ["derive", "env"] }
axum = "0.8"
tokio = { version = "1.41", features = ["full"] }
tokio-listener = { version = "0.5", features = ["axum08"] }
tower = "0.5"
tower-http = { version = "0.6", features = ["trace", "cors", "fs", "set-header"] }
tempfile = "3"
prometheus = "0.13"
aide = { version = "0.15", features = ["axum", "axum-json", "axum-query", "scalar", "macros"] }
schemars = "0.9"
openidconnect = { version = "3", features = ["reqwest"] }
tower-sessions = { version = "0.15", features = ["memory-store"] }
