# Workspace dependencies required by the cli crate type.
# Used by crate-add.sh to ensure deps exist when adding to an existing project.
[dependencies]
rust-template-foundation = { git = "https://github.com/LoganBarnett/rust-template.git" }
rust-template-lib = { path = "crates/lib" }
tracing = "0.1"
serde = { version = "1.0", features = ["derive"] }
toml = "0.8"
thiserror = "2.0"
tap = "1.0"
clap = { version = "4.5", features = ["derive", "env"] }
